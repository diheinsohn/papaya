services:
  db:
    image: postgis/postgis:16-3.4
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: papaya_dev
      POSTGRES_USER: papaya
      POSTGRES_PASSWORD: papaya_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      target: dev
    volumes:
      - ./backend:/app
    ports:
      - "5001:5000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://papaya:papaya_dev@db:5432/papaya_dev
      REDIS_URL: redis://redis:6379/0
      FLASK_ENV: development
      SECRET_KEY: dev-secret-key
      JWT_SECRET_KEY: dev-jwt-secret-key

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"

  nginx:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  frontend_node_modules:
